<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Desencriptar texto</title>
</head>
<body>
<h1>Desencriptar texto</h1>

<!-- Input para ingresar el texto encriptado -->
<input type="text" id="textoEncriptado" placeholder="Ingresa el texto encriptado">
<button onclick="desencriptarTexto()">Desencriptar</button>

<!-- Contenedor para mostrar el texto desencriptado -->
<div id="resultadoDesencriptado"></div>

<script>
    function desencriptarTexto() {
        // Obtener el texto encriptado desde el input
        const textoEncriptado = document.getElementById('textoEncriptado').value;

        // Realizar una solicitud GET a la API para obtener el texto desencriptado
        fetch(`http://192.168.18.18:9090/desencriptar/${textoEncriptado}`)
            .then(response => response.text())
            .then(data => {
                // Mostrar el texto desencriptado en el contenedor
                document.getElementById('resultadoDesencriptado').innerText = data;
            })
            .catch(error => {
                console.error('Hubo un problema al obtener el texto desencriptado:', error);
            });
    }
</script>
</body>
</html>
